<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Will you go out with me?</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Leckerli+One&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrapper">
      <h2 class="question">
        Mubashira Mohsin, will you go out with me on Eid?
      </h2>
      <img
        class="gif"
        alt="gif"
        src="https://media.giphy.com/media/FTGah7Mx3ss04PcasF/giphy.gif"
      />
      <div class="btn-group">
        <button class="yes-btn">Yes</button>
        <button class="no-btn">No</button>
      </div>

      <div class="date-options hidden" aria-live="polite">
        <div class="date-btn-group">
          <button class="date-option-btn" data-option="Movie and dinner">
            Dhurandhar and dinner
          </button>
          <button class="date-option-btn" data-option="Icecream and long walk">
            Icecream and long walk
          </button>
          <button class="date-option-btn" data-option="Haleem and chill">
            Haleem and chill
          </button>
        </div>
        <p class="copy-status hidden">Copied to clipboard.</p>
          <a
            class="instagram-btn hidden"
            href="https://www.instagram.com/siddharth404again?igsh=ZWx2am1wMXRsZHRz&utm_source=qr"
            target="_blank"
            rel="noopener noreferrer"
          >
            Open Instagram
          </a>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
